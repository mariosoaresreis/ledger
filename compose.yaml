services:
  postgres:
    image: postgres:16
    container_name: ledger-postgres
    environment:
      POSTGRES_DB: ledger
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ledger
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  postgres-query:
    image: postgres:16
    container_name: ledger-postgres-query
    environment:
      POSTGRES_DB: ledger_query
      POSTGRES_USER: ledger_query
      POSTGRES_PASSWORD: ledger_query
    ports:
      - "5433:5432"
    volumes:
      - postgres-query-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: ledger-redis
    ports:
      - "6379:6379"

  kafka:
    image: bitnami/kafka:3.7
    container_name: ledger-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_KRAFT_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ledger-command-service
    depends_on:
      - postgres
      - redis
      - kafka
    environment:
      LEDGER_DB_HOST: postgres
      LEDGER_DB_PORT: 5432
      LEDGER_DB_USERNAME: ledger
      LEDGER_DB_PASSWORD: ledger
      LEDGER_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LEDGER_REDIS_HOST: redis
      LEDGER_REDIS_PORT: 6379
    ports:
      - "8080:8080"

  query:
    build:
      context: ../ledger-query-service
      dockerfile: Dockerfile
    container_name: ledger-query-service
    depends_on:
      - postgres-query
      - redis
      - kafka
    environment:
      QUERY_DB_HOST: postgres-query
      QUERY_DB_PORT: 5432
      QUERY_DB_USERNAME: ledger_query
      QUERY_DB_PASSWORD: ledger_query
      LEDGER_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LEDGER_REDIS_HOST: redis
      LEDGER_REDIS_PORT: 6379
    ports:
      - "8081:8081"

volumes:
  postgres-data:
  postgres-query-data:

