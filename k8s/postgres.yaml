# DEPRECATED in GCP deployments.
#
# PostgreSQL is replaced by Cloud SQL (managed by Terraform).
# See terraform/modules/cloud-sql/
#
# This file is kept for local development only (see compose.yaml).
# Do NOT apply this in GCP – the database is provisioned entirely by Terraform.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: ledger
  labels:
    environment: local-only
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: ledger
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: ledger-command-secret
                  key: LEDGER_DB_USERNAME
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ledger-command-secret
                  key: LEDGER_DB_PASSWORD
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: ledger
spec:
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
