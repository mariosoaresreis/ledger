apiVersion: v1
kind: ConfigMap
metadata:
  name: ledger-command-config
  namespace: ledger
data:
  LEDGER_DB_HOST: postgres
  LEDGER_DB_PORT: "5432"
  LEDGER_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  LEDGER_REDIS_HOST: redis
  LEDGER_REDIS_PORT: "6379"
---
apiVersion: v1
kind: Secret
metadata:
  name: ledger-command-secret
  namespace: ledger
type: Opaque
stringData:
  LEDGER_DB_USERNAME: ledger
  LEDGER_DB_PASSWORD: ledger

