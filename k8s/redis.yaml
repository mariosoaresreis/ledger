# DEPRECATED in GCP deployments.
#
# Redis is replaced by Cloud Memorystore (managed by Terraform).
# See terraform/modules/memorystore/
#
# This file is kept for local development only (see compose.yaml).
# Do NOT apply this in GCP – Redis is provisioned entirely by Terraform.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: ledger
  labels:
    environment: local-only
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: ledger
spec:
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379

