apiVersion: apps/v1
kind: Deployment
metadata:
  name: ledger-command-service
  namespace: ledger
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ledger-command-service
  template:
    metadata:
      labels:
        app: ledger-command-service
    spec:
      containers:
        - name: ledger-command-service
          # Image is managed by Terraform (terraform/modules/kubernetes-app/main.tf).
          # Format: <region>-docker.pkg.dev/<project>/ledger/ledger-command-service:<tag>
          image: us-central1-docker.pkg.dev/YOUR_PROJECT_ID/ledger/ledger-command-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: ledger-command-config
            - secretRef:
                name: ledger-command-secret
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: ledger-command-service
  namespace: ledger
spec:
  selector:
    app: ledger-command-service
  ports:
    - name: http
      port: 80
      targetPort: 8080
  # LoadBalancer provisions a GCP external TCP load balancer.
  # Use "ClusterIP" + an Ingress for TLS termination in production.
  type: LoadBalancer
