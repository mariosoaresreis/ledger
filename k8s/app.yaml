apiVersion: apps/v1
kind: Deployment
metadata:
  name: ledger-command-service
  namespace: ledger
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ledger-command-service
  template:
    metadata:
      labels:
        app: ledger-command-service
    spec:
      containers:
        - name: ledger-command-service
          image: ledger-command-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: ledger-command-config
            - secretRef:
                name: ledger-command-secret
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: ledger-command-service
  namespace: ledger
spec:
  selector:
    app: ledger-command-service
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP

