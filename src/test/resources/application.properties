spring.datasource.url=jdbc:h2:mem:ledger;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration/common,classpath:db/migration/{vendor}

management.endpoints.enabled-by-default=false

# Kafka configuration for tests (uses EmbeddedKafka or localhost)
ledger.kafka.bootstrap-servers=localhost:9092
ledger.kafka.topics.events=ledger.events
ledger.kafka.topics.notifications=ledger.notifications

# Redis configuration for tests
ledger.redis.host=localhost
ledger.redis.port=6379

