spring.application.name=ledger-command-service
server.port=8080

spring.datasource.url=jdbc:postgresql://${LEDGER_DB_HOST:localhost}:${LEDGER_DB_PORT:5432}/ledger
spring.datasource.username=${LEDGER_DB_USERNAME:ledger}
spring.datasource.password=${LEDGER_DB_PASSWORD:ledger}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration/common,classpath:db/migration/{vendor}

spring.jackson.serialization.write-dates-as-timestamps=false

management.endpoints.web.exposure.include=health,info

ledger.kafka.bootstrap-servers=${LEDGER_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
ledger.kafka.topics.events=ledger.events
ledger.kafka.topics.notifications=ledger.notifications

ledger.redis.host=${LEDGER_REDIS_HOST:localhost}
ledger.redis.port=${LEDGER_REDIS_PORT:6379}
